<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lecture Ka Kismat 🎡</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
      padding: 20px;
      overflow: hidden;
    }
    
    /* Background animated glow */
    body::before {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(253, 187, 45, 0.2) 0%, transparent 70%);
      border-radius: 50%;
      filter: blur(60px);
      animation: pulse 6s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.3); opacity: 0.8; }
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.5);
      padding: 40px 25px;
      text-align: center;
      z-index: 1;
      position: relative;
    }
    
    h1 {
      color: #fff;
      font-size: 2.2rem;
      margin-bottom: 5px;
      font-weight: 800;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }
    
    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1rem;
      margin-bottom: 30px;
    }
    
    .wheel-container {
      position: relative;
      width: 320px;
      height: 320px;
      margin: 0 auto 30px;
    }
    
    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 8px solid rgba(255, 255, 255, 0.15);
      position: relative;
      overflow: hidden;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(0,0,0,0.2);
    }

    /* Text elements inside the wheel */
    .wheel-text {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 50%;
      z-index: 2;
    }
    
    .slice-text {
      position: absolute;
      top: 0;
      left: 50%;
      width: 60px;
      height: 50%;
      transform-origin: bottom center;
      text-align: center;
      padding-top: 20px;
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
      /* Transforms are applied dynamically in JS */
    }

    /* Inner circle for aesthetics */
    .wheel::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 40px; height: 40px;
      background: white;
      border-radius: 50%;
      z-index: 3;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .pointer {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 35px solid #fff;
      z-index: 10;
      filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.5));
    }
    
    .spin-btn {
      background: linear-gradient(135deg, #fdbb2d 0%, #b21f1f 100%);
      color: white;
      border: none;
      padding: 16px 50px;
      font-size: 1.3rem;
      font-weight: 800;
      font-family: 'Poppins', sans-serif;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(178, 31, 31, 0.4);
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .spin-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 25px rgba(178, 31, 31, 0.6);
    }
    .spin-btn:active {
      transform: translateY(2px);
      box-shadow: 0 4px 10px rgba(178, 31, 31, 0.4);
    }
    .spin-btn:disabled {
      background: #555;
      color: #999;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.3s cubic-bezier(0.17, 0.67, 0.2, 1.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .modal-overlay.active .modal {
      transform: scale(1);
    }
    .modal h2 {
      color: #333;
      font-size: 1.5rem;
      margin-bottom: 10px;
    }
    .modal .result-text {
      color: #b21f1f;
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 25px;
      text-transform: uppercase;
    }
    .close-btn {
      background: #333;
      color: white;
      border: none;
      padding: 10px 30px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .close-btn:hover {
      background: #555;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Lecture Ka Kismat 🎡</h1>
    <p class="subtitle">Spin to find out your fate!</p>
    
    <div class="wheel-container">
      <div class="pointer"></div>
      <div class="wheel" id="wheel">
        <div class="wheel-text" id="wheel-text"></div>
      </div>
    </div>
    
    <button class="spin-btn" id="spin-btn">Spin</button>
  </div>

  <!-- Result Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>Your Fate is Sealed:</h2>
      <div class="result-text" id="result-text">BUNK</div>
      <button class="close-btn" id="close-btn">Accept Fate</button>
    </div>
  </div>

  <script>
    const wheel = document.getElementById('wheel');
    const wheelTextContainer = document.getElementById('wheel-text');
    const spinBtn = document.getElementById('spin-btn');
    const modalOverlay = document.getElementById('modal-overlay');
    const resultText = document.getElementById('result-text');
    const closeBtn = document.getElementById('close-btn');

    // Define segments (Must add up to 360 degrees, here we have 6 slices of 60deg)
    const segments = [
      { label: 'Bunk', color: '#ff4757' },     // 0° - 60°
      { label: 'Proxy', color: '#2ed573' },    // 60° - 120°
      { label: 'Attend', color: '#1e90ff' },   // 120° - 180°
      { label: 'Sleep', color: '#ffa502' },    // 180° - 240°
      { label: 'Cancel', color: '#a4b0be' },   // 240° - 300°
      { label: 'Quiz', color: '#ff6b81' }      // 300° - 360°
    ];

    let currentRotation = 0;

    // 1. Initialize Wheel Gradient & Text
    function initWheel() {
      let gradientString = '';
      const sliceAngle = 360 / segments.length;

      segments.forEach((segment, index) => {
        const startAngle = index * sliceAngle;
        const endAngle = startAngle + sliceAngle;
        
        // Build conic-gradient string
        gradientString += `${segment.color} ${startAngle}deg ${endAngle}deg${index < segments.length - 1 ? ', ' : ''}`;
        
        // Build text elements
        const textSpan = document.createElement('div');
        textSpan.className = 'slice-text';
        textSpan.innerText = segment.label;
        // Rotate text to exactly the middle of its slice
        textSpan.style.transform = `translateX(-50%) rotate(${startAngle + (sliceAngle / 2)}deg)`;
        wheelTextContainer.appendChild(textSpan);
      });

      wheel.style.background = `conic-gradient(${gradientString})`;
    }

    // 2. Handle Spinning
    spinBtn.addEventListener('click', () => {
      spinBtn.disabled = true;

      // Spin between 5 to 10 extra full rotations + a random degree
      const randomDegree = Math.floor(Math.random() * 360) + 1800; 
      currentRotation += randomDegree;
      
      wheel.style.transform = `rotate(${currentRotation}deg)`;

      // Calculate the winning segment
      // Since gradient goes clockwise, but wheel rotates clockwise, 
      // the pointer (top) effectively moves backwards along the wheel.
      setTimeout(() => {
        const actualRotation = currentRotation % 360;
        const pointerAngle = (360 - actualRotation) % 360;
        const sliceAngle = 360 / segments.length;
        
        // Find which index the pointerAngle falls into
        const winningIndex = Math.floor(pointerAngle / sliceAngle);
        const winningSegment = segments[winningIndex];

        // Update and show modal
        resultText.innerText = winningSegment.label;
        resultText.style.color = winningSegment.color;
        modalOverlay.classList.add('active');

        spinBtn.disabled = false;
      }, 4000); // Matches the 4s CSS transition
    });

    // 3. Handle Modal Close
    closeBtn.addEventListener('click', () => {
      modalOverlay.classList.remove('active');
    });

    // Initialize the game
    initWheel();
  </script>
</body>
</html>
